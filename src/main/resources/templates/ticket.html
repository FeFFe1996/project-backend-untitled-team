<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ticket</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="page-wrapper">
    <h1>Ticket Details</h1>

    <div th:if="${error}" class="flash-error" th:text="${error}"></div>
    <div th:if="${success}" class="flash-success" th:text="${success}"></div>

    <div th:object="${ticket}">
        <div class="ticket-info">
            <div class="ticket-header">
                <span class="ticket-title" th:text="*{title}"></span>
                <span class="status-badge"
                      th:text="*{status.displayName}"
                      th:classappend="'status-' + *{status.name().toLowerCase().replace('_', '-')}">
                </span>
            </div>
            <div class="ticket-body">
                <p>Handler: <span th:text="*{assignedToUsername} ?: 'Unassigned'"></span></p>
                <p th:text="*{description}"></p>
            </div>
        </div>
    </div>

    <!-- Kommentarer -->
    <div th:if="${not #lists.isEmpty(comments)}" style="margin-top: 24px;">
        <h2 class="section-title">Comments</h2>
        <div th:each="comment : ${comments}" class="ticket-info" style="margin-top: 12px;">
            <div class="ticket-header">
                <span class="ticket-title" th:text="${comment.authorUsername}"></span>
                <span class="assigned"
                      th:text="${#temporals.format(comment.createdAt(), 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div class="ticket-body">
                <p class="comment-text" th:text="${comment.text}"></p>
            </div>
        </div>
    </div>

    <!-- Kommentarsformulär -->
    <div th:if="${canComment}" style="margin-top: 24px;">
        <h2 class="section-title">Add Comment</h2>
        <form th:action="@{/tickets/{id}/comments(id=${ticket.id})}"
              th:object="${comment}"
              method="post">
            <div>
                <label for="text">Comment:</label>
                <textarea id="text" th:field="*{text}" placeholder="Write your comment here..."></textarea>
                <span th:if="${#fields.hasErrors('text')}"
                      th:errors="*{text}"
                      class="field-error"></span>
            </div>
            <div style="margin-top: 12px;">
                <button type="submit" class="btn">Add Comment</button>
            </div>
        </form>
    </div>

    <!-- Aktivitetslogg -->
    <div th:if="${not #lists.isEmpty(auditLogs)}" style="margin-top: 24px;">
        <h2 class="section-title">Activity Log</h2>
        <div th:each="entry : ${auditLogs}" class="ticket-info" style="margin-top: 12px;">
            <div class="ticket-body">
                <p><strong th:text="${entry.action.displayName}"></strong></p>
                <p th:if="${entry.userId != null}"
                   th:text="'By: ' + ${auditUserMap[entry.userId] ?: 'Unknown user'}"></p>
                <p class="assigned"
                   th:text="${#temporals.format(entry.timestamp, 'yyyy-MM-dd HH:mm')}"></p>
            </div>
        </div>
    </div>

    <footer style="margin-top: 24px;">
        <nav style="display: flex; gap: 10px;">
            <a th:if="${canClose}"
               th:href="@{/tickets/{id}/close(id=${ticket.id})}" class="btn btn-danger">Close</a>
            <a sec:authorize="hasAnyRole('HANDLER', 'SUPERVISOR', 'ADMIN')"
               th:href="@{/handler}" class="btn btn-secondary">Back</a>
            <a sec:authorize="hasRole('USER')"
               th:href="@{/user}" class="btn btn-secondary">Back</a>
        </nav>
    </footer>
</div>
</body>
</html>
