<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Tickets</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="page-wrapper">
    <div class="page-header">
        <h1>My Tickets</h1>
        <div class="ticket-actions">
            <a th:href="@{/tickets/create}" class="btn">+ New ticket</a>
            <a th:href="@{/tickets/upload}" class="btn btn-secondary">Upload file</a>
        </div>
    </div>

    <div class="filter-tabs">
        <a th:href="@{/user}"
           th:classappend="${filter == null or filter == 'all'} ? ' active'"
           class="filter-tab">All</a>
        <a th:href="@{/user(filter='open')}"
           th:classappend="${filter == 'open'} ? ' active'"
           class="filter-tab">Open</a>
        <a th:href="@{/user(filter='closed')}"
           th:classappend="${filter == 'closed'} ? ' active'"
           class="filter-tab">Closed</a>
    </div>

    <p class="empty-state" th:if="${#lists.isEmpty(tickets)}">
        No tickets yet. <a th:href="@{/tickets/create}">Create one?</a>
    </p>

    <div class="ticket-info" th:each="ticket : ${tickets}">
        <div class="ticket-header">
            <span class="ticket-title" th:text="${ticket.title}"></span>
            <span class="status-badge"
                  th:text="${ticket.status.displayName}"
                  th:classappend="'status-' + ${ticket.status.name().toLowerCase().replace('_', '-')}">
            </span>
        </div>
        <div class="ticket-body">
            <p th:text="${ticket.description}"></p>
        </div>
        <div class="ticket-footer">
            <span class="assigned"
                  th:text="${ticket.assignedToUsername != null ? 'Assigned to: ' + ticket.assignedToUsername : 'Unassigned'}"></span>
            <div class="ticket-button">
                <a th:href="@{/tickets/{id}/edit(id=${ticket.id})}" class="btn btn-secondary">Edit</a>
                <a th:if="${ticket.status.name() != 'CLOSED' and ticket.status.name() != 'SOLVED'}"
                   th:href="@{/tickets/{id}/close(id=${ticket.id})}" class="btn btn-danger">Close</a>
            </div>
        </div>
    </div>
    <footer>
        <nav style="display: flex; gap: 10px;">
            <a th:href="@{/}" class="btn btn-secondary">Home</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </nav>
    </footer>
</div>
</body>
</html>
